<template>
  <section class="retail-execution-shell" aria-busy={isLoading}>
    <template lwc:if={showHeader}>
      <header class="panel-header">
        <h2 class="panel-title">Retail Execution</h2>
      </header>
    </template>

    <template lwc:if={isLoading}>
      <div class="panel-state">Loading retail execution...</div>
    </template>

    <template lwc:elseif={hasError}>
      <div class="panel-state panel-state_error">{errorMessage}</div>
    </template>

    <template lwc:else>
      <div class="retail-execution">
        <section class="summary-block">
          <p class="summary-line">
            <span class="summary-label">Store:</span>
            <span>{accountName}</span>
          </p>

          <template lwc:if={isCheckedIn}>
            <p class="summary-line">
              <span class="summary-label">Checked In:</span>
              <span>{checkedInDisplay}</span>
            </p>
          </template>

          <template lwc:else>
            <p class="summary-line summary-line_compact">
              <span class="summary-label">Last Visit:</span>
              <span>{lastVisitDisplay}</span>
              <template lwc:if={lastVisitName}>
                <button class="visit-link" type="button" onclick={handleShowLastVisit}>{lastVisitName}</button>
              </template>
            </p>
          </template>
        </section>

        <template lwc:if={isCheckedIn}>
          <section class="form-panel">
            <div class="entry-grid">
            <label class="field field_short">
              <span class="field-label">Shelf Condition</span>
              <select
                class="field-control"
                name="Shelf_Condition__c"
                disabled={isSaving}
                onchange={handleFieldChange}
              >
                <template for:each={shelfOptionsForRender} for:item="option">
                  <option key={option.value} value={option.value} selected={option.selected}>{option.label}</option>
                </template>
              </select>
            </label>

            <label class="field field_short">
              <span class="field-label">Display Count</span>
              <input
                class="field-control"
                name="Promotional_Display_Count__c"
                type="number"
                value={draftVisit.promotionalDisplayCount}
                disabled={isSaving}
                onchange={handleFieldChange}
              />
            </label>
            </div>

            <label class="field-checkbox">
              <input
                name="Spoke_To_Manager__c"
                type="checkbox"
                checked={draftVisit.spokeToManager}
                disabled={isSaving}
                onchange={handleFieldChange}
              />
              <span>Spoke To Manager</span>
            </label>

            <div class="actions">
              <button
                class="button button_neutral"
                type="button"
                disabled={isSaving}
                onclick={handleCancelDraft}
              >
                Cancel
              </button>
              <button
                class="button button_brand"
                type="button"
                disabled={isSaving}
                onclick={handleSaveDraft}
              >
                {saveButtonLabel}
              </button>
            </div>
          </section>
        </template> 

        <template lwc:else>
          <div class="actions actions_single">
            <button
              class="button button_brand"
              type="button"
              disabled={isLoading}
              onclick={handleStartVisit}
            >
              Check In
            </button>
          </div>

          <template lwc:if={isViewingLastVisit}>
            <section class="visit-panel">
              <template for:each={viewingVisitRows} for:item="row">
                <p class="detail-row" key={row.key}>
                  <span class="detail-label">{row.label}:</span>
                  <span>{row.value}</span>
                </p>
              </template>

              <div class="actions actions_single">
                <button class="button button_neutral" type="button" onclick={handleCloseLastVisit}>
                  Close
                </button>
              </div>
            </section>
          </template>
        </template>
      </div>
    </template>
  </section>
</template>
