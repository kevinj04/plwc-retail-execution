<template>
  <section class="retail-execution">
    <template lwc:if={isLoading}>
      <div class="state">Loading retail execution...</div>
    </template>

    <template lwc:elseif={hasError}>
      <div class="state error">{errorMessage}</div>
    </template>

    <template lwc:else>
      <div class="state">
        <p>Retail Execution</p>
        <p>Store: {accountName}</p>

        <template lwc:if={isCheckedIn}>
          <p>Draft visit started.</p>
          <lightning-combobox
            name="Shelf_Condition__c"
            label="Shelf Condition"
            options={shelfOptions}
            value={draftVisit.shelfCondition}
            onchange={handleFieldChange}
          ></lightning-combobox>
          <lightning-input
            name="Promotional_Display_Count__c"
            type="number"
            label="Display Count"
            value={draftVisit.promotionalDisplayCount}
            onchange={handleFieldChange}
          ></lightning-input>
          <lightning-input
            name="Spoke_To_Manager__c"
            type="checkbox"
            label="Spoke To Manager"
            checked={draftVisit.spokeToManager}
            onchange={handleFieldChange}
          ></lightning-input>
          <div>
            <lightning-button label="Cancel" onclick={handleCancelDraft}></lightning-button>
            <lightning-button label="Check-Out" variant="brand" disabled={isSaving} onclick={handleSaveDraft}></lightning-button>
          </div>
        </template>

        <template lwc:else>
          <p>Last Visit: {lastVisitName}</p>
          <div>
            <lightning-button label="Check In" variant="brand" onclick={handleStartVisit}></lightning-button>
            <template lwc:if={lastVisit}>
              <lightning-button label="View Last Visit" onclick={handleShowLastVisit}></lightning-button>
            </template>
          </div>

          <template lwc:if={isViewingLastVisit}>
            <div class="state">
              <p>Visit: {viewingVisit.name}</p>
              <p>Check In: {viewingVisit.checkInAt}</p>
              <p>Check Out: {viewingVisit.checkOutAt}</p>
              <p>Shelf Condition: {viewingVisit.shelfCondition}</p>
              <p>Display Count: {viewingVisit.promotionalDisplayCount}</p>
              <p>Spoke To Manager: {viewingVisit.spokeToManager}</p>
              <lightning-button label="Close" onclick={handleCloseLastVisit}></lightning-button>
            </div>
          </template>
        </template>
      </div>
    </template>
  </section>
</template>
