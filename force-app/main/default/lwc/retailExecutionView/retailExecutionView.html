<template>
  <lightning-card title="Retail Execution">
    <template lwc:if={isLoading}>
      <div class="panel-state">Loading retail execution...</div>
    </template>

    <template lwc:elseif={hasError}>
      <div class="panel-state panel-state_error">{errorMessage}</div>
    </template>

    <template lwc:else>
      <div class="retail-execution">
        <p class="summary-line">
          <span class="summary-label">Store:</span>
          <span>{accountName}</span>
        </p>

        <template lwc:if={isCheckedIn}>
          <p class="summary-line">
            <span class="summary-label">Checked In:</span>
            <span>{checkedInDisplay}</span>
          </p>

          <div class="entry-grid">
            <lightning-combobox
              class="field field_short"
              name="Shelf_Condition__c"
              label="Shelf Condition"
              options={shelfOptions}
              value={draftVisit.shelfCondition}
              disabled={isSaving}
              onchange={handleFieldChange}
            ></lightning-combobox>

            <lightning-input
              class="field field_short"
              name="Promotional_Display_Count__c"
              type="number"
              label="Display Count"
              value={draftVisit.promotionalDisplayCount}
              disabled={isSaving}
              onchange={handleFieldChange}
            ></lightning-input>
          </div>

          <lightning-input
            class="field-checkbox"
            name="Spoke_To_Manager__c"
            type="checkbox"
            label="Spoke To Manager"
            checked={draftVisit.spokeToManager}
            disabled={isSaving}
            onchange={handleFieldChange}
          ></lightning-input>

          <div class="actions">
            <lightning-button
              variant="neutral"
              label="Cancel"
              disabled={isSaving}
              onclick={handleCancelDraft}
            ></lightning-button>
            <lightning-button
              variant="brand"
              label={saveButtonLabel}
              disabled={isSaving}
              onclick={handleSaveDraft}
            ></lightning-button>
          </div>
        </template> 

        <template lwc:else>
          <p class="summary-line">
            <span class="summary-label">Last Visit:</span>
            <span>{lastVisitDisplay}</span>
            <template lwc:if={lastVisitName}>
              <button class="visit-link" type="button" onclick={handleShowLastVisit}>{lastVisitName}</button>
            </template>
          </p>

          <div class="actions actions_single">
            <lightning-button
              label="Check In"
              variant="brand"
              disabled={isLoading}
              onclick={handleStartVisit}
            ></lightning-button>
          </div>

          <template lwc:if={isViewingLastVisit}>
            <section class="visit-panel">
              <template for:each={viewingVisitRows} for:item="row">
                <p class="detail-row" key={row.key}>
                  <span class="detail-label">{row.label}:</span>
                  <span>{row.value}</span>
                </p>
              </template>

              <div class="actions actions_single">
                <lightning-button
                  variant="neutral"
                  label="Close"
                  onclick={handleCloseLastVisit}
                ></lightning-button>
              </div>
            </section>
          </template>
        </template>
      </div>
    </template>
  </lightning-card>
</template>
